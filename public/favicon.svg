<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- 渐变背景：从活力橙到科技紫，呼应"趣味工具"的定位 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- 倒角圆角矩形遮罩 -->
    <clipPath id="rounded">
      <rect x="4" y="4" width="56" height="56" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- 背景底板 -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="url(#bg)"/>

  <!-- "FT" 字母组合，白色描边风格 -->
  <g clip-path="url(#rounded)">
    <!-- F 字母主干 -->
    <rect x="16" y="14" width="5" height="36" rx="2.5" fill="white"/>
    <!-- F 上横杠 -->
    <rect x="16" y="14" width="18" height="5" rx="2.5" fill="white"/>
    <!-- F 中横杠 -->
    <rect x="16" y="28" width="14" height="5" rx="2.5" fill="white"/>
    <!-- T 字母主干 (与 F 垂直重叠部分共用) -->
    <rect x="38" y="14" width="5" height="36" rx="2.5" fill="white"/>
    <!-- T 上横杠 -->
    <rect x="34" y="14" width="16" height="5" rx="2.5" fill="white"/>
  </g>
</svg>
