<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="50%" stop-color="#1A1035"/>
      <stop offset="100%" stop-color="#0F0F1E"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- 深色科技感背景 -->
  <rect width="1200" height="630" rx="24" fill="url(#cardBg)"/>

  <!-- 装饰性几何元素 -->
  <circle cx="1100" cy="100" r="200" fill="#7C3AED" opacity="0.08"/>
  <circle cx="100" cy="530" r="250" fill="#FF6B35" opacity="0.06"/>
  <circle cx="600" cy="630" r="300" fill="#FF6B35" opacity="0.04"/>

  <!-- Logo 区域 -->
  <rect x="520" y="90" width="160" height="160" rx="36" fill="url(#logo)"/>

  <!-- FT 字母 -->
  <rect x="546" y="118" width="14" height="104" rx="7" fill="white"/>
  <rect x="546" y="118" width="50" height="14" rx="7" fill="white"/>
  <rect x="546" y="158" width="38" height="14" rx="7" fill="white"/>
  <rect x="590" y="118" width="14" height="104" rx="7" fill="white"/>
  <rect x="574" y="118" width="46" height="14" rx="7" fill="white"/>

  <!-- 主标题 -->
  <text x="600" y="330" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="64" font-weight="800" letter-spacing="-2">
    FunTools
  </text>

  <!-- 副标题 -->
  <text x="600" y="388" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="28" font-weight="400">
    趣味工具箱 · 小游戏与小工具集合
  </text>

  <!-- 功能标签 -->
  <g transform="translate(600, 460)">
    <rect x="-440" y="-10" width="880" height="60" rx="30" fill="rgba(255,255,255,0.06)"/>
    <text x="0" y="22" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="22">
      圣诞树 3D · 幸运转盘 · 俄罗斯方块 · 番茄钟 · 塔罗占卜 · 骰子
    </text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="200" y1="580" x2="1000" y2="580" stroke="#7C3AED" stroke-opacity="0.2" stroke-width="2"/>
</svg>
